basePath: /
definitions:
  dto.BookChapterResponse:
    properties:
      Book:
        $ref: '#/definitions/dto.BookResponse'
      chapter_id:
        type: string
      content:
        type: string
      order:
        type: integer
      price:
        type: integer
      title:
        type: string
      vip_level:
        type: string
    type: object
  dto.BookListResponse:
    properties:
      books:
        items:
          $ref: '#/definitions/dto.BookResponse'
        type: array
      count:
        type: integer
      page:
        type: integer
      size:
        type: integer
    type: object
  dto.BookResponse:
    properties:
      bookshelf_amount:
        type: integer
      browse_amount:
        type: integer
      cover_image:
        type: string
      created_at:
        type: string
      description:
        type: string
      id:
        type: string
      name:
        type: string
      owner_id:
        type: string
      price:
        type: integer
      push_at:
        type: string
      updated_at:
        type: string
      vip_level:
        type: string
    type: object
  dto.BuyBookChapterRequest:
    properties:
      book_id:
        type: string
      chapter_id:
        type: string
      price:
        type: integer
    required:
    - book_id
    - chapter_id
    - price
    type: object
  dto.BuyBookRequest:
    properties:
      bookID:
        type: string
      price:
        type: integer
    type: object
  dto.CreatBookChapterRequest:
    properties:
      book_id:
        type: string
      content:
        type: string
      price:
        type: integer
      title:
        type: string
      vip_level:
        type: string
    required:
    - book_id
    - content
    - price
    - title
    - vip_level
    type: object
  dto.CreateBookRequest:
    properties:
      cover_image:
        type: string
      description:
        type: string
      name:
        type: string
      price:
        type: integer
      push_at:
        type: string
      vip_level:
        description: OwnerId     string    `json:"owner_id"`
        type: string
    required:
    - cover_image
    - description
    - name
    type: object
  dto.CreateOrderRequest:
    properties:
      price:
        type: number
      reward_gold:
        type: integer
    required:
    - price
    - reward_gold
    type: object
  dto.CreateUserBookshelfRequest:
    properties:
      book_id:
        type: string
    required:
    - book_id
    type: object
  dto.CreateUserRequest:
    properties:
      age:
        maximum: 130
        minimum: 0
        type: integer
      email:
        type: string
      password:
        minLength: 6
        type: string
      username:
        type: string
      verify:
        type: string
    required:
    - email
    - password
    - username
    type: object
  dto.EmailVerifyRequest:
    properties:
      email:
        type: string
    required:
    - email
    type: object
  dto.EmailVerifyResponse:
    properties:
      email:
        type: string
    type: object
  dto.GetOrderListResponse:
    properties:
      count:
        type: integer
      orders:
        items:
          $ref: '#/definitions/dto.OrderResponse'
        type: array
      page:
        type: integer
      size:
        type: integer
    type: object
  dto.GetUserPurchasedBookResponse:
    properties:
      active_at:
        type: string
      book_id:
        type: string
      purchased_at:
        type: string
      purchased_id:
        type: string
      user_id:
        type: string
    type: object
  dto.GetUserPurchasedChapterResponse:
    properties:
      active_at:
        type: string
      book_id:
        type: string
      chapter_id:
        type: string
      purchased_at:
        type: string
      purchased_id:
        type: string
      user_id:
        type: string
    type: object
  dto.ListUserBookshelfResponse:
    properties:
      books:
        items:
          $ref: '#/definitions/dto.UserBookshelfResponse'
        type: array
      count:
        type: integer
      page:
        type: integer
      size:
        type: integer
    type: object
  dto.ListUserHistoryResponse:
    properties:
      books:
        items:
          $ref: '#/definitions/dto.UserHistoryResponse'
        type: array
      count:
        type: integer
      page:
        type: integer
      size:
        type: integer
    type: object
  dto.LoginRequest:
    properties:
      password:
        type: string
      username:
        type: string
    required:
    - password
    - username
    type: object
  dto.LoginResponse:
    properties:
      token:
        type: string
      user_id:
        type: string
      username:
        type: string
    type: object
  dto.OrderResponse:
    properties:
      created_at:
        type: string
      order_id:
        type: string
      original_price:
        type: number
      past_at:
        type: string
      pay_price:
        type: number
      reword_gold:
        type: integer
      status:
        type: integer
      user_id:
        type: string
    type: object
  dto.UpdateBookChapterRequest:
    properties:
      content:
        type: string
      id:
        type: string
      title:
        type: string
    required:
    - id
    type: object
  dto.UpdateUserEmailRequest:
    properties:
      email:
        type: string
      password:
        minLength: 6
        type: string
      verify:
        type: string
    required:
    - email
    - password
    - verify
    type: object
  dto.UpdateUserPasswordRequest:
    properties:
      password:
        minLength: 6
        type: string
      verify:
        type: string
    required:
    - password
    - verify
    type: object
  dto.UpdateUserRequest:
    properties:
      age:
        maximum: 130
        minimum: 0
        type: integer
      description:
        minLength: 1
        type: string
      username:
        type: string
    type: object
  dto.UploadBookCoverResponse:
    properties:
      book_id:
        type: string
      url:
        type: string
    type: object
  dto.UserAssetResponse:
    properties:
      gold:
        type: integer
      id:
        type: string
      vip_level:
        type: integer
      vip_mark:
        type: string
    type: object
  dto.UserBookshelfResponse:
    properties:
      book_id:
        type: string
      created_at:
        type: string
      id:
        type: string
      user_id:
        type: string
    type: object
  dto.UserHistoryResponse:
    properties:
      book_id:
        type: string
      created_at:
        type: string
      id:
        type: string
      user_id:
        type: string
    type: object
  dto.UserResponse:
    properties:
      age:
        type: integer
      cover_image:
        type: string
      created_at:
        type: string
      description:
        type: string
      email:
        type: string
      id:
        type: string
      profile_image:
        type: string
      updated_at:
        type: string
      username:
        type: string
    type: object
  dto.UserStatResponse:
    properties:
      age:
        type: integer
      asset_gold:
        type: integer
      cover_image:
        type: string
      created_at:
        type: string
      description:
        type: string
      email:
        type: string
      id:
        type: string
      profile_image:
        type: string
      read_books_num:
        type: integer
      read_words_num:
        type: integer
      updated_at:
        type: string
      username:
        type: string
    type: object
  response.Response:
    properties:
      code:
        type: integer
      data: {}
      message:
        type: string
    type: object
host: localhost:9929
info:
  contact:
    email: support@example.com
    name: API Support
  description: fiction_book API文档
  license:
    name: GNU
    url: https://opensource.org/license/gpl-3.0
  termsOfService: http://swagger.io/terms/
  title: fiction_book swagger
  version: "1.0"
paths:
  /api/v1/assets:
    get:
      consumes:
      - application/json
      description: 获取指定用户的资产信息，包括金币、VIP标识和VIP等级
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.UserAssetResponse'
              type: object
        "400":
          description: 参数错误
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/response.Response'
        "4011":
          description: 用户不存在
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - Bearer: []
      summary: 获取用户资产（认证）
      tags:
      - 资产管理
  /api/v1/auth/email/verify:
    post:
      consumes:
      - application/json
      description: 向指定邮箱发送验证码
      parameters:
      - description: 邮箱信息
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.EmailVerifyRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 发送成功
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.EmailVerifyResponse'
              type: object
        "400":
          description: 参数错误
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: 服务器内部出错
          schema:
            $ref: '#/definitions/response.Response'
      summary: 获取邮箱验证码
      tags:
      - 认证
  /api/v1/auth/login:
    post:
      consumes:
      - application/json
      description: 用户登录并获取JWT token
      parameters:
      - description: 登录信息
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.LoginResponse'
              type: object
        "400":
          description: 参数错误
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/response.Response'
        "4006":
          description: 用户名或密码错误
          schema:
            $ref: '#/definitions/response.Response'
      summary: 用户登录
      tags:
      - 认证
  /api/v1/books/{id}:
    get:
      consumes:
      - application/json
      description: 根据ID获取书籍详情
      parameters:
      - description: 书籍ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.BookResponse'
              type: object
        "400":
          description: 参数错误
          schema:
            $ref: '#/definitions/response.Response'
        "401":
          description: 登录已失效
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/response.Response'
        "4001":
          description: 书籍未找到
          schema:
            $ref: '#/definitions/response.Response'
      summary: 获取书籍
      tags:
      - 书籍管理
  /api/v1/books/{id}/chapters/list:
    get:
      consumes:
      - application/json
      description: 获取书籍章节列表
      parameters:
      - description: 书籍id
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
        "400":
          description: 参数错误
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/response.Response'
        "4001":
          description: 书籍未找到
          schema:
            $ref: '#/definitions/response.Response'
      summary: 获取书籍章节列表
      tags:
      - 章节管理
  /api/v1/books/{id}/cover:
    post:
      consumes:
      - multipart/form-data
      description: 用户上传指定书籍的封面图片，支持jpg格式
      parameters:
      - description: 书籍ID
        in: path
        name: id
        required: true
        type: string
      - description: 封面图片文件（仅支持 jpg，尺寸必须为 368X460）
        in: formData
        name: cover_image
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: 封面URL
          schema:
            $ref: '#/definitions/dto.UploadBookCoverResponse'
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/response.Response'
        "401":
          description: 用户未登录
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/response.Response'
        "4001":
          description: 书籍未找到
          schema:
            $ref: '#/definitions/response.Response'
        "4005":
          description: 文件大小超出
          schema:
            $ref: '#/definitions/response.Response'
        "4011":
          description: 文件类型出错
          schema:
            $ref: '#/definitions/response.Response'
        "4012":
          description: 图片不合规
          schema:
            $ref: '#/definitions/response.Response'
        "4020":
          description: 你没有该书籍的所有权
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - Bearer: []
      summary: 上传书籍封面（验证）
      tags:
      - 书籍管理
  /api/v1/books/create:
    post:
      consumes:
      - application/json
      description: 创建一本新书籍（需要认证）
      parameters:
      - description: 创建书籍请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.CreateBookRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.BookResponse'
              type: object
        "400":
          description: 参数错误
          schema:
            $ref: '#/definitions/response.Response'
        "401":
          description: 登录已失效
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/response.Response'
        "4008":
          description: 书籍已存在
          schema:
            $ref: '#/definitions/response.Response'
      summary: 创建书籍
      tags:
      - 书籍管理
  /api/v1/books/list:
    get:
      consumes:
      - application/json
      description: 分页获取书籍列表
      parameters:
      - default: 1
        description: 页码
        in: query
        name: page
        type: integer
      - default: 10
        description: 每页数量
        in: query
        name: size
        type: integer
      - default: browse_amount
        description: 排序字段 (browse_amount|bookshelf_amount|new_update|new_push)
        in: query
        name: sort_key
        type: string
      - default: desc
        description: 排序方向 (asc|desc)
        in: query
        name: sort_order
        type: string
      - description: 书籍创建开始时间  (RFC格式)
        in: query
        name: push_start_time
        type: string
      - description: 书籍创建结束时间
        in: query
        name: push_end_time
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.BookListResponse'
              type: object
        "400":
          description: 参数错误
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/response.Response'
      summary: 获取书籍列表
      tags:
      - 书籍管理
  /api/v1/books/own/list:
    get:
      consumes:
      - application/json
      description: 获取书籍owner_id为该用户的书籍（认证）
      parameters:
      - default: 1
        description: 页码
        in: query
        name: page
        type: integer
      - default: 10
        description: 每页数量
        in: query
        name: size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 封面URL
          schema:
            $ref: '#/definitions/dto.UploadBookCoverResponse'
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/response.Response'
        "401":
          description: 用户登录失效
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - Bearer: []
      summary: 获取用户创作的书籍
      tags:
      - 书籍管理
  /api/v1/books/thermal/daily:
    get:
      consumes:
      - application/json
      description: 榜单每5分钟刷新，缓存优化
      parameters:
      - default: 1
        description: 页码
        in: query
        name: page
        type: integer
      - default: 10
        description: 每页数量
        in: query
        name: size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 封面URL
          schema:
            $ref: '#/definitions/dto.UploadBookCoverResponse'
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/response.Response'
      summary: 获取每日热度榜单
      tags:
      - 书籍管理
  /api/v1/bookshelf/{user_id}:
    get:
      consumes:
      - application/json
      description: 获取指定用户的书架列表（分页）
      parameters:
      - description: 用户ID
        in: path
        name: user_id
        required: true
        type: string
      - default: 1
        description: 页码
        in: query
        name: page
        type: integer
      - default: 10
        description: 每页数量
        in: query
        name: size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.ListUserBookshelfResponse'
              type: object
        "400":
          description: 参数错误
          schema:
            $ref: '#/definitions/response.Response'
        "401":
          description: 登录已失效
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - Bearer: []
      summary: 获取用户书架
      tags:
      - 书架管理
  /api/v1/bookshelf/add:
    post:
      consumes:
      - application/json
      description: 将书籍添加到用户书架（需要认证）
      parameters:
      - description: 书籍信息
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.CreateUserBookshelfRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
        "400":
          description: 参数错误
          schema:
            $ref: '#/definitions/response.Response'
        "401":
          description: 登录已失效
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - Bearer: []
      summary: 添加到书架
      tags:
      - 书架管理
  /api/v1/buy/book:
    post:
      consumes:
      - application/json
      description: 购买书籍（认证）
      parameters:
      - description: 用户ID
        in: path
        name: id
        required: true
        type: string
      - description: 更新信息
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.BuyBookRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.UserResponse'
              type: object
        "400":
          description: 参数错误
          schema:
            $ref: '#/definitions/response.Response'
        "401":
          description: 登录已失效
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/response.Response'
        "4001":
          description: 书籍未找到
          schema:
            $ref: '#/definitions/response.Response'
        "4002":
          description: 用户未找到
          schema:
            $ref: '#/definitions/response.Response'
        "4009":
          description: 书籍已购买
          schema:
            $ref: '#/definitions/response.Response'
        "4016":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/response.Response'
        "4017":
          description: 价格校验出错
          schema:
            $ref: '#/definitions/response.Response'
        "4018":
          description: 余额不足
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - Bearer: []
      summary: 购买书籍
      tags:
      - 消费管理
  /api/v1/buy/chapter:
    post:
      consumes:
      - application/json
      description: 购买章节（认证）
      parameters:
      - description: 购买章节请求
        in: body
        name: request
        required: true
        schema:
